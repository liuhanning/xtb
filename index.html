<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="theme-color" content="#4f46e5">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <title>小学错题本</title>
  <link rel="manifest" href="./manifest.json">
  <link rel="stylesheet" href="./css/style.css">
</head>
<body>
  <div id="app">
    <!-- Header -->
    <header class="header">
      <h1 id="page-title">🦊 错题本</h1>
      <button id="btn-back" class="btn-icon hidden">&#8592;</button>
      <button id="btn-settings" class="btn-icon" title="设置">&#9881;</button>
    </header>

    <!-- Views -->
    <main id="main-content">
      <!-- List View -->
      <section id="view-list" class="view">
        <div class="search-bar">
          <input type="text" id="search-input" placeholder="搜索题目...">
        </div>
        <div class="filter-bar">
          <button class="filter-btn active" data-subject="all">全部</button>
          <button class="filter-btn" data-subject="math">数学</button>
          <button class="filter-btn" data-subject="chinese">语文</button>
          <button class="filter-btn" data-subject="english">英语</button>
          <button class="filter-btn" data-subject="other">其他</button>
        </div>
        <div class="toggle-bar">
          <label class="toggle">
            <input type="checkbox" id="toggle-mastered">
            <span class="toggle-slider"></span>
            <span class="toggle-label">显示已掌握</span>
          </label>
        </div>
        <div id="question-list" class="question-list"></div>
      </section>

      <!-- Add/Edit View -->
      <section id="view-add" class="view hidden">
        <form id="question-form">
          <!-- Camera area always visible -->
          <div class="form-group">
            <label>题目图片</label>
            <div class="image-upload-area" id="image-upload-area">
              <input type="file" id="form-image" accept="image/*" capture="environment" hidden>
              <button type="button" id="btn-camera" class="btn-secondary">拍照</button>
              <button type="button" id="btn-gallery" class="btn-secondary">选图</button>
              <button type="button" id="btn-analyze" class="btn-analyze hidden">智能识别</button>
              <div id="analyze-status" class="analyze-status hidden"></div>
              <img id="image-preview" class="hidden" alt="题目图片预览">
            </div>
          </div>

          <!-- Form fields: hidden until AI recognition or manual edit -->
          <div id="form-fields" class="hidden">
            <div class="form-group">
              <label for="form-subject">科目</label>
              <select id="form-subject" required>
                <option value="math">数学</option>
                <option value="chinese">语文</option>
                <option value="english">英语</option>
                <option value="other">其他</option>
              </select>
            </div>
            <div class="form-group">
              <label for="form-knowledge-point">知识点</label>
              <input type="text" id="form-knowledge-point" list="knowledge-point-list" placeholder="如：分数加减法、古诗默写...">
              <datalist id="knowledge-point-list"></datalist>
            </div>
            <div class="form-group">
              <label for="form-error-type">错误类型</label>
              <select id="form-error-type">
                <option value="calculation">计算错误</option>
                <option value="concept">概念不清</option>
                <option value="careless">粗心大意</option>
                <option value="understand">理解偏差</option>
                <option value="knowledge">知识盲点</option>
                <option value="other">其他</option>
              </select>
            </div>
            <div class="form-group">
              <label for="form-question">题目</label>
              <div class="input-with-voice">
                <textarea id="form-question" rows="3" required placeholder="输入题目..."></textarea>
                <button type="button" id="btn-voice" class="btn-voice" title="语音输入">&#127908;</button>
              </div>
              <div id="voice-status" class="voice-status hidden"></div>
            </div>
            <div class="form-group">
              <label for="form-wrong">孩子的答案</label>
              <textarea id="form-wrong" rows="2" placeholder="孩子写的答案..."></textarea>
            </div>
            <div class="form-group">
              <label for="form-correct">正确答案</label>
              <textarea id="form-correct" rows="2" placeholder="正确答案..."></textarea>
            </div>
            <div class="form-group">
              <label for="form-note">备注</label>
              <textarea id="form-note" rows="2" placeholder="错误原因等..."></textarea>
            </div>
          </div>

          <button type="submit" id="btn-save" class="btn-primary hidden">保存</button>
        </form>
      </section>

      <!-- Detail View -->
      <section id="view-detail" class="view hidden">
        <div id="detail-content"></div>

        <!-- QA Panel -->
        <div id="qa-panel" class="qa-panel hidden">
          <button id="btn-qa-toggle" class="qa-toggle-btn">向AI提问</button>
          <div id="qa-body" class="qa-body hidden">
            <div id="qa-chat" class="qa-chat-area"></div>
            <div class="qa-input-area">
              <textarea id="qa-input" rows="2" placeholder="输入你的问题，例如：这道题怎么做？"></textarea>
              <button id="btn-qa-send" class="qa-send-btn">&#10148;</button>
            </div>
          </div>
        </div>

        <div class="detail-actions">
          <button id="btn-edit" class="btn-secondary">编辑</button>
          <button id="btn-similar" class="btn-secondary">举一反三</button>
          <button id="btn-toggle-master" class="btn-secondary">标记已掌握</button>
          <button id="btn-delete" class="btn-danger">删除</button>
        </div>
      </section>

      <!-- Paper Config View -->
      <section id="view-paper-config" class="view hidden">
        <div class="paper-config-card">
          <div class="form-group">
            <label>科目</label>
            <select id="paper-subject">
              <option value="all">全部科目</option>
              <option value="math">数学</option>
              <option value="chinese">语文</option>
              <option value="english">英语</option>
            </select>
          </div>
          <div class="form-group">
            <label>题目数量</label>
            <div class="quantity-selector">
              <button class="qty-btn" data-count="5">5题</button>
              <button class="qty-btn active" data-count="10">10题</button>
              <button class="qty-btn" data-count="20">20题</button>
              <input type="number" id="paper-custom-count" placeholder="自定义" min="1" max="100">
            </div>
          </div>
          <div class="form-group">
            <label>排序方式</label>
            <select id="paper-sort-order">
              <option value="random">随机抽取</option>
              <option value="newest">最近错题</option>
              <option value="oldest">最早错题</option>
            </select>
          </div>
          <button id="btn-generate-paper" class="btn-primary">生成试卷</button>
        </div>
      </section>

      <!-- Paper Preview View -->
      <section id="view-paper" class="view hidden">
        <div class="paper-actions">
          <button id="btn-print-paper" class="btn-primary">打印试卷</button>
          <button id="btn-grade-paper" class="btn-analyze">拍照判卷</button>
        </div>
        <div id="paper-preview"></div>
      </section>

      <!-- Grade View (拍照判卷) -->
      <section id="view-grade" class="view hidden">
        <div class="grade-card">
          <div class="form-group">
            <label>拍摄已完成的试卷</label>
            <div class="image-upload-area">
              <input type="file" id="grade-image" accept="image/*" capture="environment" hidden>
              <button type="button" id="btn-grade-camera" class="btn-secondary">拍照</button>
              <button type="button" id="btn-grade-gallery" class="btn-secondary">选图</button>
              <img id="grade-preview" class="hidden" alt="判卷图片预览">
            </div>
          </div>
          <button id="btn-submit-grade" class="btn-primary" disabled>AI 判卷</button>
          <div id="grade-status" class="analyze-status hidden"></div>
          <div id="grade-results" class="grade-results hidden"></div>
        </div>
      </section>

      <!-- Statistics View -->
      <section id="view-stats" class="view hidden">
        <div id="stats-content"></div>
      </section>

      <!-- Game View (错题闯关) -->
      <section id="view-game" class="view hidden">
        <div class="game-header-bar">
          <div class="game-stat">
            <span id="game-lives">❤️❤️❤️</span>
          </div>
          <div class="game-stat">
            <span id="game-coins">💰 100</span>
          </div>
          <div class="game-stat">
            <span id="game-progress">0/16</span>
          </div>
          <button id="btn-shop" class="btn-shop">🏪</button>
        </div>
        <div class="game-controls">
          <span id="game-phase-label" class="game-phase-label"></span>
          <span id="dice-display" class="dice-display">🎲</span>
          <button id="btn-roll-dice" class="btn-roll hidden">掷骰子</button>
        </div>
        <div id="game-board-grid" class="game-board-grid"></div>
      </section>
    </main>

    <!-- Settings Modal -->
    <div id="settings-modal" class="modal hidden">
      <div class="modal-content">
        <div class="modal-header">
          <h3>设置</h3>
          <button id="btn-close-settings" class="btn-close">&times;</button>
        </div>
        <div class="modal-body">
          <p style="color: #64748b; margin-bottom: 16px;">AI 服务由服务端提供，无需配置 API Key。</p>
          <hr style="margin: 20px 0; border: none; border-top: 1px solid #e2e8f0;">
          <div class="form-group">
            <label>数据管理</label>
            <div style="display: flex; gap: 12px; flex-wrap: wrap;">
              <button id="btn-export" class="btn-secondary">导出数据</button>
              <label class="btn-secondary" style="cursor: pointer; display: inline-block; margin: 0;">
                导入数据
                <input type="file" id="btn-import" accept=".json" style="display: none;">
              </label>
            </div>
            <p class="settings-hint">导出为 JSON 文件备份，或从 JSON 文件导入恢复数据。</p>
          </div>
        </div>
      </div>
    </div>

    <!-- Question Selection Modal (multi-question recognition) -->
    <div id="selection-modal" class="modal hidden">
      <div class="modal-content modal-wide">
        <div class="modal-header">
          <h3>识别到多道题目，请选择要添加的</h3>
          <button id="btn-select-cancel" class="btn-close">&times;</button>
        </div>
        <div class="modal-body">
          <div id="selection-list" class="selection-list"></div>
          <button id="btn-select-add" class="btn-primary">添加选中题目</button>
        </div>
      </div>
    </div>

    <!-- Similar Questions Modal (举一反三) -->
    <div id="similar-modal" class="modal hidden">
      <div class="modal-content modal-wide">
        <div class="modal-header">
          <h3>举一反三 — 同类型变式练习</h3>
          <button id="btn-similar-close" class="btn-close">&times;</button>
        </div>
        <div class="modal-body">
          <div id="similar-status" class="analyze-status hidden"></div>
          <div id="similar-list" class="similar-list"></div>
          <button id="btn-similar-print" class="btn-secondary hidden">打印练习卷</button>
        </div>
      </div>
    </div>

    <!-- Game Quiz Modal -->
    <div id="game-quiz-modal" class="modal hidden">
      <div class="modal-content">
        <div class="modal-header">
          <h3 id="quiz-title">答题</h3>
          <button id="btn-quiz-close" class="btn-close">&times;</button>
        </div>
        <div class="modal-body">
          <div id="quiz-question" class="quiz-question"></div>
          <div id="quiz-options" class="quiz-options"></div>
          <div id="quiz-result" class="quiz-result hidden"></div>
          <button id="btn-quiz-next" class="btn-primary hidden">下一回合</button>
        </div>
      </div>
    </div>

    <!-- Game End Modal -->
    <div id="game-end-modal" class="modal hidden">
      <div class="modal-content">
        <div class="modal-header">
          <h3>游戏结束</h3>
          <button id="btn-game-end-close" class="btn-close">&times;</button>
        </div>
        <div class="modal-body">
          <div id="game-end-stats" class="game-end-stats"></div>
          <button id="btn-game-restart" class="btn-primary">再来一局</button>
        </div>
      </div>
    </div>

    <!-- Game Shop Modal -->
    <div id="game-shop-modal" class="modal hidden">
      <div class="modal-content">
        <div class="modal-header">
          <h3>🏪 道具商店</h3>
          <button id="btn-shop-close" class="btn-close">&times;</button>
        </div>
        <div class="modal-body">
          <div class="shop-coins" id="shop-coins"></div>
          <div class="shop-items" id="shop-items"></div>
        </div>
      </div>
    </div>

    <!-- FAB -->
    <button id="btn-add" class="fab">&#128221;</button>

    <!-- Bottom Tab Bar -->
    <nav class="tab-bar">
      <button class="tab-item active" data-view="list">
        <span class="tab-icon">📝</span>
        <span>错题</span>
      </button>
      <button class="tab-item" data-view="paper-config">
        <span class="tab-icon">📋</span>
        <span>组卷</span>
      </button>
      <button class="tab-item" data-view="game">
        <span class="tab-icon">🎮</span>
        <span>闯关</span>
      </button>
      <button class="tab-item" data-view="stats">
        <span class="tab-icon">📊</span>
        <span>分析</span>
      </button>
    </nav>
  </div>

  <script src="./js/db.js"></script>
  <script src="./js/camera.js"></script>
  <script src="./js/voice.js"></script>
  <script src="./js/qwen.js"></script>
  <script src="./js/app.js"></script>
  <script src="./js/game.js"></script>
  <script>
    // Auto-seed test data if DB is empty
    (async function seedTestData() {
      await new Promise(r => setTimeout(r, 800));

      // Check if we already have data
      try {
        const existing = await getAllQuestions({ showMastered: true });
        if (existing.length > 0) {
          console.log('[Seed] DB already has', existing.length, 'questions, skipping');
          return;
        }
      } catch (e) {
        console.log('[Seed] Cannot check existing data:', e.message);
      }

      const questions = [
        { subject: 'math', kp: '分数加减法', q: '计算：1/3 + 2/5 = ?', wrong: '3/8', correct: '11/15' },
        { subject: 'math', kp: '乘法口诀', q: '7 \u00d7 8 = ?', wrong: '54', correct: '56' },
        { subject: 'math', kp: '几何面积', q: '一个长方形长6cm，宽4cm，面积是多少？', wrong: '20cm\u00b2', correct: '24cm\u00b2' },
        { subject: 'math', kp: '应用题', q: '小明有12个苹果，分给3个朋友，每人分到几个？', wrong: '3个', correct: '4个' },
        { subject: 'chinese', kp: '古诗默写', q: '默写\u300a静夜思\u300b：床前明月光，____。', wrong: '低头思故乡（错写为"抬头望明月"）', correct: '\u7591\u662f\u5730\u4e0a\u971c\u3002\u4e3e\u5934\u671b\u660e\u6708\uff0c\u4f4e\u5934\u601d\u6545\u4e61\u3002' },
        { subject: 'chinese', kp: '成语填空', q: '画龙点____ 守株待____', wrong: '花、人', correct: '\u775b\u3001\u5154' },
        { subject: 'chinese', kp: '\u62fc\u97f3', q: '\u7ed9\u201c\u5feb\u4e50\u201d\u6807\u6ce8\u62fc\u97f3', wrong: 'ku\u00e0i l\u00e8i', correct: 'ku\u00e0i l\u00e8' },
        { subject: 'english', kp: '单词拼写', q: '写出\u201c\u52a8\u7269\u56ed\u201d\u7684\u82f1\u6587', wrong: 'zo', correct: 'zoo' },
        { subject: 'english', kp: '语法选择', q: 'She ___ a student. (am/is/are)', wrong: 'are', correct: 'is' },
        { subject: 'english', kp: '日常对话', q: '\u7528\u82f1\u8bed\u8bf4\u201c\u4f60\u597d\u5417\uff1f\u201d', wrong: 'How old are you?', correct: 'How are you?' },
        { subject: 'math', kp: '分数加减法', q: '计算：5/6 - 1/4 = ?', wrong: '4/2', correct: '7/12' },
        { subject: 'chinese', kp: '阅读理解', q: '\u201c\u6625\u7720\u4e0d\u89c9\u6653\u201d\u7684\u4e0b\u4e00\u53e5\u662f\u4ec0\u4e48\uff1f', wrong: '处处蚊子咬', correct: '处处闻啼鸟' },
        { subject: 'english', kp: '单词拼写', q: '写出\u201c\u8001\u5e08\u201d\u7684\u82f1\u6587', wrong: 'teachar', correct: 'teacher' },
        { subject: 'math', kp: '乘法口诀', q: '9 \u00d7 6 = ?', wrong: '56', correct: '54' },
        { subject: 'chinese', kp: '古诗默写', q: '默写\u300a春晓\u300b：春眠不觉晓，____。', wrong: '处处蚊子咬', correct: '处处闻啼鸟' },
      ];

      const errorTypes = ['calculation', 'concept', 'careless', 'understand', 'knowledge', 'other'];

      console.log('[Seed] Inserting', questions.length, 'questions...');
      let count = 0;
      for (const item of questions) {
        try {
          await addQuestion({
            subject: item.subject,
            knowledgePoint: item.kp,
            errorType: errorTypes[Math.floor(Math.random() * errorTypes.length)],
            question: item.q,
            wrongAnswer: item.wrong,
            correctAnswer: item.correct,
            note: '',
          });
          count++;
        } catch (e) {
          console.warn('[Seed] Error inserting:', e.message);
        }
      }
      console.log('[Seed] Done! Inserted', count, '/', questions.length, 'questions');
      // Refresh list if on list view
      if (typeof renderList === 'function') renderList();
    })();
  </script>
  <script>
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('./sw.js');
    }
  </script>
</body>
</html>
